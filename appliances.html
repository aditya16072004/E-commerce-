<script>
let links = document.querySelectorAll("nav a");
let currentPage = window.location.pathname.split("/").pop();
if(currentPage === ""){
currentPage = "appliances.html";
}
links.forEach(link => {
let linkPage = link.getAttribute("href");
if(linkPage === currentPage){
link.classList.add("active");
}
});
</script>
<div id="productModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
<div style="background:white; padding:20px; margin:100px auto; width:300px; border-radius:10px;">
<span onclick="closeModal()" style="float:right; cursor:pointer;">X</span>
<h2 id="pName"></h2>
<p id="pPrice"></p>
<p id="pDesc"></p>
</div>
</div>
<script>
function showProduct(name, price, desc) {
document.getElementById("pName").innerText = name;
document.getElementById("pPrice").innerText = "Price: ₹" + price;
document.getElementById("pDesc").innerText = desc;
document.getElementById("productModal").style.display = "block";
}
function closeModal() {
document.getElementById("productModal").style.display = "none";
}
</script>
